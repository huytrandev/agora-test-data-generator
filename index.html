<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agora · Test Data Generator</title>
  <script>
    // Apply the saved theme before paint to avoid a flash of the wrong palette.
    try { document.documentElement.dataset.theme = localStorage.getItem('tdg-theme') || 'dark' }
    catch { document.documentElement.dataset.theme = 'dark' } // localStorage blocked (private mode) — default to dark
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="wordmark">
        <span class="mark">Agora<span class="dot">·</span></span>
        <span class="mark-sub">Test Data Generator</span>
      </div>
      <nav class="tabs" id="tabs" aria-label="Record type">
        <button class="tab active" data-type="parent"><span class="k">1</span><span class="t">Parent</span></button>
        <button class="tab" data-type="student"><span class="k">2</span><span class="t">Student / Child</span></button>
        <button class="tab" data-type="course"><span class="k">3</span><span class="t">Course</span></button>
        <button class="tab" data-type="instance"><span class="k">4</span><span class="t">Course Instance</span></button>
        <button class="tab" data-type="class"><span class="k">5</span><span class="t">Class</span></button>
        <button class="tab" data-type="product"><span class="k">6</span><span class="t">Product</span></button>
        <button class="tab" data-type="message"><span class="k">7</span><span class="t">Update Message</span></button>
        <button class="tab" data-type="ticket"><span class="k">8</span><span class="t">Ticket</span></button>
        <button class="tab" data-type="files"><span class="k">9</span><span class="t">Files</span></button>
      </nav>
      <div class="rail-foot">
        <span class="pill" id="fakerPill" title="Source of varied lorem text">source: loading…</span>
        <button class="theme-toggle" id="themeToggle" title="Toggle light / dark">☀ Light</button>
      </div>
    </aside>

    <main class="content">
      <div class="toolbar">
        <div class="bar">
          <div class="field">
            <label for="count">Records</label>
            <div class="stepper">
              <button data-step="-1" aria-label="decrease">−</button>
              <input type="number" id="count" value="3" min="1" max="100" />
              <button data-step="1" aria-label="increase">+</button>
            </div>
          </div>
          <div class="field data-only">
            <label for="len">Text length</label>
            <select id="len">
              <option value="normal" selected>Normal</option>
              <option value="long">Long</option>
              <option value="stress">Stress (overflow)</option>
            </select>
          </div>
          <div class="field data-only">
            <label for="seed">Seed</label>
            <input type="text" id="seed" placeholder="random" inputmode="numeric" />
          </div>
          <div class="field files-only" hidden>
            <label for="fileType">File type</label>
            <select id="fileType">
              <option value="png" selected>PNG image</option>
              <option value="jpeg">JPEG image</option>
              <option value="pdf">PDF</option>
            </select>
          </div>
          <div class="field files-only" hidden>
            <label for="fileSize">File size</label>
            <input type="text" id="fileSize" value="1MB" list="sizePresets" />
            <datalist id="sizePresets">
              <option value="100KB"></option>
              <option value="500KB"></option>
              <option value="1MB"></option>
              <option value="5MB"></option>
              <option value="10MB"></option>
            </datalist>
          </div>
          <button class="generate" id="run">Generate</button>
          <div class="spacer"></div>
          <div class="field data-only">
            <label>Export batch</label>
            <div class="export-group">
              <button class="mini" id="exportJson">JSON</button>
              <button class="mini" id="exportCsv">CSV</button>
            </div>
          </div>
          <div class="field files-only" hidden>
            <label>All files</label>
            <button class="mini" id="downloadAll">Download all</button>
          </div>
        </div>
        <div class="manifest" id="manifest"></div>
      </div>

      <p class="copyhint">
        Click any value to copy. <b>Update Message</b> renders a formatted preview — use <b>copy formatted</b> to keep
        rich text for a WYSIWYG editor. No repeated names within a batch. Dates are <code>dd/mm/yyyy</code>.
      </p>

      <div class="cards" id="cards">
        <div class="placeholder">Pick a type and hit Generate.</div>
      </div>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
